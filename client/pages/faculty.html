<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Faculty — SIMMS</title>
    <link rel="stylesheet" href="/css/style.css" />
    <meta name="color-scheme" content="dark" />
</head>

<body>
    <div class="app-shell" id="app">

        <!-- Sidebar -->
        <aside class="sidebar">
            <a class="sidebar-brand" href="/pages/dashboard.html">
                <div class="sidebar-mark">S</div>
                <div class="sidebar-brand-text">
                    <span class="sidebar-brand-name">WSIMMS</span>
                    <span class="sidebar-brand-sub">Marks Intelligence</span>
                </div>
            </a>

            <div class="nav-section-label">Workspace</div>

            <nav class="nav">
                <a class="nav-link" href="/pages/dashboard.html">Dashboard</a>
                <a class="nav-link" href="/pages/marks.html">Marks</a>
                <a class="nav-link" href="/pages/analytics.html">Analytics</a>
                <a class="nav-link" href="/pages/students.html">Students</a>

                <!-- ✅ NEW FACULTY LINK -->
                <a class="nav-link active" href="/pages/faculty.html">
                    <span>Faculty</span>
                </a>

                <a class="nav-link" href="/pages/remedials.html">Remedials</a>
                <a class="nav-link" href="/pages/settings.html">Settings</a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-chip">
                    <strong data-who>—</strong>
                    <div class="hint">Professional Session</div>
                </div>
                <button type="button" class="btn ghost btn-block" data-logout>Log Out</button>
            </div>
        </aside>

        <!-- Main -->
        <div class="app-content">

            <header class="topbar">
                <div class="topbar-left">
                    <div style="font-weight: 600;">Faculty Management</div>
                </div>
            </header>

            <main class="main">
                <style>
                    .faculty-table {
                        width: 100%;
                        border-collapse: collapse;
                        text-align: left;
                    }
                    .faculty-table th {
                        padding: 1rem 1.5rem;
                        font-size: 0.75rem;
                        text-transform: uppercase;
                        letter-spacing: 0.05em;
                        color: var(--text-dim);
                        background: rgba(255, 255, 255, 0.02);
                    }
                    .faculty-table td {
                        padding: 1.1rem 1.5rem;
                        border-top: 1px solid var(--border);
                        vertical-align: middle;
                    }
                    .faculty-table tbody tr:hover {
                        background: rgba(255, 255, 255, 0.02);
                    }
                    .table-user {
                        display: flex;
                        align-items: center;
                        gap: 0.9rem;
                        min-width: 0;
                    }
                    .table-avatar {
                        width: 2.5rem;
                        height: 2.5rem;
                        border-radius: 0.75rem;
                        background: linear-gradient(145deg, rgba(99, 102, 241, 0.18), rgba(99, 102, 241, 0.06));
                        border: 1px solid rgba(129, 140, 248, 0.18);
                        color: var(--primary);
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        font-weight: 700;
                        flex-shrink: 0;
                    }
                    .table-user-copy {
                        min-width: 0;
                    }
                    .table-user-copy strong {
                        display: block;
                        line-height: 1.2;
                        margin-bottom: 0.2rem;
                    }
                    .table-user-copy span {
                        display: block;
                        font-size: 0.82rem;
                        color: var(--text-dim);
                        overflow-wrap: anywhere;
                    }
                    .table-actions {
                        display: flex;
                        gap: 0.5rem;
                        justify-content: flex-start;
                        flex-wrap: wrap;
                    }
                </style>

                <header style="display:flex; justify-content:space-between; margin-bottom:2rem;">
                    <div>
                        <h1>Faculty</h1>
                        <p style="color:gray;">Manage faculty accounts</p>
                    </div>

                    <!-- ADD FACULTY -->
                    <button class="btn primary" id="btnNew">
                        Add Faculty
                    </button>
                </header>

                <!-- TABLE -->
                <div class="card">
                    <div style="padding:1rem;">
                        <input class="input" id="search" placeholder="Search faculty..." />
                    </div>

                    <table class="faculty-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Username</th>
                                <th>Actions</th>
                            </tr>
                        </thead>

                        <tbody id="tbody"></tbody>
                    </table>
                </div>

            </main>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal-backdrop" id="modalFc">
        <div class="modal">

            <div class="modal-h">
                <h2 id="fcModalTitle">Add Faculty</h2>
                <button class="btn ghost" data-close>&times;</button>
            </div>

            <div class="modal-b">

                <div class="field">
                    <label>Name</label>
                    <input class="input" id="fcName" />
                </div>

                <div class="field">
                    <label>Username</label>
                    <input class="input" id="fcUsername" />
                </div>

                <div class="field">
                    <label>Email</label>
                    <input class="input" id="fcEmail" type="email" />
                </div>

                <div class="field">
                    <label>Password</label>
                    <input class="input" id="fcPassword" type="password" />
                </div>

                <div style="display:flex; gap:1rem; margin-top:1rem;">
                    <button class="btn primary" id="fcSave">Save</button>
                    <button class="btn ghost" data-close>Cancel</button>
                </div>

            </div>
        </div>
    </div>

    <script type="module" src="/js/faculty.js"></script>

</body>

</html>
